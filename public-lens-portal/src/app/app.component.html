<header class="site-header">
  <div class="header-inner">
    <a routerLink="/home" class="logo-link">
      <span class="logo-mark" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 2l8.5 9.5L12 22l-8.5-10.5L12 2z" />
        </svg>
      </span>
      <span class="logo-text">AlignwithMe</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <a
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="/surveys" routerLinkActive="active">Surveys</a>
      <a routerLink="/result" routerLinkActive="active">Results</a>
    </nav>

    <button type="button" class="login-btn" (click)="auth.login()">
      Login
    </button>
  </div>
</header>

<main class="site-main">
  <router-outlet></router-outlet>
</main>
