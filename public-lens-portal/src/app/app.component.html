<header class="site-header">
  <div
    class="header-inner"
    [class.nav-menu-open]="navOpen"
  >
    <div class="header-left">
      <a routerLink="/home" class="logo-link">
        <span class="logo-mark" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2l8.5 9.5L12 22l-8.5-10.5L12 2z" />
          </svg>
        </span>
        <span class="logo-text">AlignwithMe</span>
      </a>

      <button
        type="button"
        class="nav-toggle"
        (click)="navOpen = !navOpen"
        [attr.aria-expanded]="navOpen"
        aria-controls="primary-nav"
        aria-label="Toggle navigation menu"
      >
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
      </button>
    </div>

    <nav
      id="primary-nav"
      class="site-nav"
      aria-label="Primary"
      (click)="closeNavOnNavigate()"
    >
      <a
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="/surveys" routerLinkActive="active">Surveys</a>
      <a routerLink="/result" routerLinkActive="active">Results</a>
    </nav>

    <div class="header-right">
      <button
        type="button"
        class="sign-in-btn"
        *ngIf="!auth.isLoggedIn()"
        (click)="auth.login()"
      >
        Sign In
      </button>

      <div class="user-section" *ngIf="auth.isLoggedIn()">
        <span class="user-email">{{ auth.getEmail() }}</span>
        <button
          type="button"
          class="sign-out-btn"
          (click)="auth.logout()"
        >
          Sign Out
        </button>
      </div>
    </div>
  </div>
</header>

<main class="site-main">
  <router-outlet></router-outlet>
</main>
