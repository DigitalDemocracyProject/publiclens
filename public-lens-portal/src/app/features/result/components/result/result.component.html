<div class="result-page">
  <div class="result-inner">
    <h1 class="result-title">Survey results</h1>
    <p class="result-intro">
      Breakdowns below use sample aggregates for demonstration. Connect your analytics API to replace this data.
    </p>

    <section class="chart-section">
      <h2 class="chart-heading">{{ questions[0].title }}</h2>
      <mat-form-field appearance="outline" class="dim-select">
        <mat-label>Break down by</mat-label>
        <mat-select [value]="selectedDimQ5" (selectionChange)="onDimQ5Change($event.value)">
          <mat-option *ngFor="let d of dimensions" [value]="d.id">{{ d.label }}</mat-option>
        </mat-select>
      </mat-form-field>
      <div class="chart-canvas-wrap">
        <canvas #chartSalaries aria-label="Chart for salaries question"></canvas>
      </div>
    </section>

    <section class="chart-section">
      <h2 class="chart-heading">{{ questions[1].title }}</h2>
      <mat-form-field appearance="outline" class="dim-select">
        <mat-label>Break down by</mat-label>
        <mat-select [value]="selectedDimQ6" (selectionChange)="onDimQ6Change($event.value)">
          <mat-option *ngFor="let d of dimensions" [value]="d.id">{{ d.label }}</mat-option>
        </mat-select>
      </mat-form-field>
      <div class="chart-canvas-wrap">
        <canvas #chartLawOrder aria-label="Chart for law and order question"></canvas>
      </div>
    </section>
  </div>
</div>
